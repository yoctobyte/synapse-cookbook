<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --fg:#1b1f24; --muted:#57606a; --bg:#ffffff; --accent:#0969da;
    --code-bg:#f6f8fa; --border:#d0d7de;
  }
  @media (prefers-color-scheme:dark){
    :root{ --fg:#e6edf3; --muted:#8b949e; --bg:#0d1117; --accent:#58a6ff;
           --code-bg:#161b22; --border:#30363d; }
  }
  html{ scroll-behavior:smooth; }
  body{
    max-width:820px; margin:0 auto; padding:0 1.2rem 5rem;
    font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--fg); background:var(--bg);
  }
  a{ color:var(--accent); text-decoration:none; }
  a:hover{ text-decoration:underline; }
  h1,h2,h3,h4{ line-height:1.25; margin-top:2.2rem; }
  h1{ border-bottom:1px solid var(--border); padding-bottom:.3rem; }
  h2{ border-bottom:1px solid var(--border); padding-bottom:.2rem; }
  code{ background:var(--code-bg); padding:.15em .35em; border-radius:5px; font-size:.9em; }
  pre{ background:var(--code-bg); padding:1rem; border-radius:8px; overflow:auto;
       border:1px solid var(--border); }
  pre code{ background:none; padding:0; }
  table{ border-collapse:collapse; }
  th,td{ border:1px solid var(--border); padding:.4rem .6rem; }
  blockquote{ border-left:4px solid var(--border); margin:0; padding:.2rem 1rem; color:var(--muted); }
  #TOC{ background:var(--code-bg); border:1px solid var(--border); border-radius:8px;
        padding:1rem 1.4rem; margin:1.5rem 0; }
  #TOC ul{ margin:.2rem 0; }
  hr{ border:none; border-top:1px solid var(--border); margin:2.5rem 0; }
</style>
